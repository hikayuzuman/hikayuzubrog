name: RSS Auto Post

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate posts from RSS
        env:
          RSS_URL: ${{ secrets.RSS_URL }}
          MAX_ITEMS: "3"
        run: npm run rss:post

      - name: Commit changes
        run: |
          if git status --porcelain | grep -q .; then
            git config user.name "rss-bot"
            git config user.email "rss-bot@users.noreply.github.com"
            git add src/content/posts
            git commit -m "chore: auto-post from RSS"
            git push
          else
            echo "No changes to commit."
          fi
